transition:all .3s;
}

#message{
font-size:5vw;
font-weight:bold;
text-align:center;
padding:20px;
animation:flash .4s infinite;
}

@keyframes flash{
0%{opacity:1;}
50%{opacity:.2;}
100%{opacity:1;}
}

</style>

</head>

<body>

<div id="message">ANALYZING...</div>

<script>

"YOU ACTIVATED ROAST MODE",
"SHADY DETECTED",
"HIGH RISK VISITOR",
"BAD ACTOR DETECTED",
"LOL NICE ATTEMPT",

"THE QR IS LAUGHING",
"THE SERVER IS DISAPPOINTED",
"YOUR COVER IS BLOWN",
"NOT TODAY",
"THE AUDACITY",
"THE DETECTOR NEVER SLEEPS",
"TRUST LEVEL: ZERO",

"UNAUTHORIZED SHADINESS",
"YOU WERE EXPECTED",

"FRAUD SCORE: 100",

"YOU PICKED THE WRONG QR",
"MISSION ABORTED",
"PLOT TWIST: WE NOTICED",
"THE CROWD IS BOOING",
"THE INTERNET REMEMBERS",
"SCAN COMPLETE",
"TARGET ACQUIRED",

"ATTEMPT UNSUCCESSFUL",
"FAKE VIBES DETECTED",
"TOO OBVIOUS",
"TOO MANY CLUES",
"LOW CREDIBILITY",
"CREDIBILITY NOT FOUND",
"TRUST CHECK FAILED",
"VIBE CHECK FAILED",
"VERIFICATION FAILED",
"THE QR CODE HAS SPOKEN",

"BETTER HIDE THE RED FLAGS",
"THE PLAN HAS FAILED",
"HONESTY UPDATE REQUIRED",
"YOU TRIGGERED THE ALARM",
"ALARM ACTIVATED",
"MAXIMUM SUS LEVEL",
"SUS LEVEL 999",
"CRITICAL SCAM LEVEL",
"THIS IS EMBARRASSING",
"EVERYONE SAW THAT",

"THE EVIDENCE IS STACKING UP",
"YOU HAD ONE JOB",
"ABSOLUTELY NOT",
"NOPE",
"DENIED",
"ACCESS REVOKED",
"YOU HAVE BEEN ROASTED",
"ROAST COMPLETE",
"ROAST BUFFER OVERFLOW",
"SCAM SHIELD ACTIVATED",

"YOU AGAIN?",
"SERIOUSLY?",

"QUESTIONABLE DECISIONS",
"THE CASE IS CLOSED",
"GAME OVER",
"THANKS FOR PLAYING",
"INSERT HONESTY HERE",
"BETTER LUCK NEVER"
];

while(messages.length < 300){
messages.push(
messages[Math.floor(Math.random()*messages.length)]
+ " #" + messages.length
);
}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}

const chosen = shuffle([...messages]).slice(0,3);

const colors = [
"red","yellow","lime",
"cyan","orange","white",
"magenta"
];

let index = 0;

function showNext(){

document.body.style.background =
colors[Math.floor(Math.random()*colors.length)];

document.getElementById("message").style.color =
colors[Math.floor(Math.random()*colors.length)];

document.getElementById("message").innerText =
chosen[index];

index++;

if(index < chosen.length){

setTimeout(showNext,2000);

}

}

setTimeout(showNext,1000);

</script>
