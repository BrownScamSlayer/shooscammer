<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner</title>

<style>
body{
  margin:0;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
}

#text{
  color:white;
  font-size:50px;
  font-weight:bold;
  text-align:center;
  transition: opacity 0.15s ease;
}
</style>
</head>

<body>

<div id="text">INITIALIZING...</div>

<script>

const messages = [
"SCANNING SYSTEM",
"ANALYZING INPUT",
"CHECKING SIGNAL",
"RUNNING DIAGNOSTICS",
"VERIFYING DATA",
"SUSPICION CHECK ACTIVE",
"TRUST LEVEL EVALUATION",
"PATTERN ANALYSIS RUNNING",
"LOOKING FOR ANOMALIES",
"SYSTEM REVIEW IN PROGRESS",
"PROCESSING REQUEST",
"DEEP SCAN ACTIVE",
"RISK ASSESSMENT RUNNING",
"BEHAVIOR CHECK INITIATED",
"INTEGRITY CHECKING",
"DATA VALIDATION ACTIVE",
"REALITY CHECK ENGAGED",
"ALGORITHM THINKING",
"SIGNAL INTERPRETATION",
"FINALIZING ANALYSIS"
];

function update(){
  const el = document.getElementById("text");

  // fade effect
  el.style.opacity = 0;

  setTimeout(() => {
    el.textContent = messages[Math.floor(Math.random() * messages.length)];
    el.style.opacity = 1;
  }, 150);
}

update();
setInterval(update, 1200);

</script>

</body>
</html>
