<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suspicion Scanner</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    transition:background-color .4s;
}

#message{
    width:90%;
    text-align:center;
    font-size:clamp(28px,5vw,80px);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:2px;
    animation:flash .35s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:.2;}
    100%{opacity:1;}
}
</style>

</head>
<body>

<div id="message">ANALYZING...</div>

<script>

const openings = [
"SCAM DETECTOR",
"SUSPICION SCANNER",
"TRUST ANALYZER",
"RED FLAG MONITOR",
"VIBE CHECK SYSTEM",
"QR INVESTIGATION UNIT",
"HONESTY ENGINE",
"QUESTIONABLE ACTIVITY MONITOR",
"ALGORITHM",
"CASE REVIEW BOARD",
"INTERNET COMMITTEE",
"RISK ASSESSMENT ENGINE"
];

const actions = [
"DETECTED",
"FLAGGED",
"IDENTIFIED",
"LOCATED",
"CONFIRMED",
"RECORDED",
"LOGGED",
"OBSERVED",
"ANALYZED",
"QUESTIONED",
"REVIEWED",
"EXAMINED"
];

const findings = [
"SUSPICIOUS ENERGY",
"TOO MANY RED FLAGS",
"A CURIOUS PATTERN",
"UNUSUAL ACTIVITY",
"QUESTIONABLE DECISIONS",
"A HIGH SUS SCORE",
"UNEXPECTED SHENANIGANS",
"A TRUST DEFICIT",
"ODD CIRCUMSTANCES",
"A MYSTERIOUS SITUATION",
"EXCESSIVE CONFIDENCE",
"A BOLD STRATEGY",
"A PUZZLING DEVELOPMENT",
"AN INTERESTING EXPLANATION",
"UNCONVINCING EVIDENCE",
"A COMPLICATED STORY"
];

const reactions = [
"THE INTERNET IS CONCERNED",
"THE QR CODE HAS QUESTIONS",
"THE SERVER REMAINS SKEPTICAL",
"THE DETECTOR REQUESTS CLARIFICATION",
"FURTHER REVIEW IS RECOMMENDED",
"THE CASE CONTINUES",
"THE INVESTIGATION EXPANDS",
"THE EVIDENCE IS STACKING UP",
"THE CROWD IS UNCONVINCED",
"COMMON SENSE HAS ENTERED THE CHAT",
"THE ALGORITHM WOULD LIKE A WORD",
"THE AUDIT WAS INCONCLUSIVE",
"THE FILE HAS BEEN FORWARDED",
"ADDITIONAL RED FLAGS DETECTED"
];

const extras = [
"CASE CLOSED",
"CASE REOPENED",
"TRUST SCORE: LOW",
"VIBE CHECK FAILED",
"ANOTHER RED FLAG APPEARED",
"SUSPICION LEVEL: MAXIMUM",
"PLEASE TRY HONESTY",
"RESULTS MAY BE EMBARRASSING",
"THIS QR CODE REMEMBERS",
"THE DETECTOR NEVER SLEEPS",
"FURTHER QUESTIONS EXPECTED",
"NO ADDITIONAL COMMENTS"
];

function randomItem(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateMessage(){

    return `${randomItem(openings)}
${randomItem(actions)}
${randomItem(findings)}

${randomItem(reactions)}

${randomItem(extras)}`;

}

const colors = [
"#ff0000",
"#ffff00",
"#00ff00",
"#00ffff",
"#ff00ff",
"#ffffff",
"#ff8800",
"#88ff00",
"#00aaff"
];

function nextMessage(){

    document.body.style.backgroundColor =
        colors[Math.floor(Math.random()*colors.length)];

    const msg = document.getElementById("message");

    msg.style.color =
        colors[Math.floor(Math.random()*colors.length)];

    msg.innerText = generateMessage();
}

nextMessage();

setInterval(nextMessage,1500);

</script>

</body>
</html>
