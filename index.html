<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* FORCE SINGLE LINE DISPLAY */
#message{
    color:white;
    font-size:clamp(28px,5vw,70px);
    font-weight:900;
    text-align:center;
    text-transform:uppercase;
    white-space:nowrap;      /* IMPORTANT: prevents line breaks */
    overflow:hidden;
    text-overflow:ellipsis;
}
</style>

</head>

<body>

<div id="message">INITIALIZING...</div>

<script>

/* =========================
   MESSAGE BANKS
========================= */

const first = [
"SCAM DETECTOR","TRUST ANALYZER","RISK ENGINE","RED FLAG MONITOR","VIBE CHECKER",
"CASE REVIEW UNIT","QR INVESTIGATION SYSTEM","SUSPICION SCANNER","DIGITAL INSPECTOR",
"CREDIBILITY ANALYZER","FACT CHECK ENGINE","SHENANIGAN DETECTOR","HONESTY ASSESSOR",
"LOGIC REVIEW PANEL","REALITY CHECK ENGINE","TRUTH VERIFICATION UNIT","ANOMALY DETECTOR",
"THE ALGORITHM","THE DETECTOR","THE AUDIT TEAM","THE INVESTIGATION BOARD"
];

const second = [
"DETECTED","IDENTIFIED","OBSERVED","FLAGGED","RECORDED","CONFIRMED","ANALYZED",
"LOGGED","CLASSIFIED","EVALUATED","MONITORED","TRACKED","QUESTIONED","INVESTIGATED",
"VERIFIED","AUDITED","PROCESSED","SCANNED","REPORTED","UNCOVERED"
];

const third = [
"QUESTIONABLE ACTIVITY","TOO MANY RED FLAGS","SUSPICIOUS ENERGY","UNUSUAL BEHAVIOR",
"CURIOUS DECISIONS","HIGH SUS LEVEL","A STRANGE PATTERN","UNCONVINCING EVIDENCE",
"A MYSTERIOUS DEVELOPMENT","QUESTIONABLE TIMING","A CONCERNING TREND",
"A LOW CREDIBILITY SCORE","A RISKY CHOICE","AN UNSTABLE PROFILE",
"A DIGITAL ANOMALY","UNEXPECTED PATTERN DETECTED"
];

const fourth = [
"THE INTERNET IS CONCERNED","THE QR CODE HAS QUESTIONS","FURTHER REVIEW RECOMMENDED",
"COMMON SENSE HAS ENTERED THE CHAT","INVESTIGATION CONTINUES","THE SYSTEM REMAINS SKEPTICAL",
"REVIEW IN PROGRESS","FINAL VERDICT PENDING","PLEASE STAND BY","MORE DATA REQUIRED"
];

/* =========================
   RANDOM PICKER
========================= */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateMessage(){
    return `${pick(first)} ${pick(second)} ${pick(third)} — ${pick(fourth)}`;
}

/* =========================
   LOOP
========================= */

function update(){
    document.getElementById("message").textContent = generateMessage();
}

update();
setInterval(update, 1200);

</script>

</body>
</html>
