<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suspicion Scanner</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    transition:background-color .4s;
}

#message{
    width:90%;
    text-align:center;
    font-size:clamp(28px,5vw,70px);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:2px;
    animation:flash .35s infinite;
    white-space:pre-line;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:.2;}
    100%{opacity:1;}
}
</style>

</head>

<body>

<div id="message">ANALYZING...</div>

<script>

/* =========================
   LARGE MESSAGE BANKS
========================= */

const first = [
"SCAM DETECTOR","TRUST ANALYZER","RISK ENGINE","RED FLAG MONITOR","VIBE CHECKER",
"CASE REVIEW UNIT","QR INVESTIGATION SYSTEM","COMMON SENSE DEPARTMENT","SUSPICION SCANNER",
"DIGITAL INSPECTOR","CREDIBILITY ANALYZER","QUESTIONABLE ACTIVITY BUREAU","INTERNET OVERSIGHT COMMITTEE",
"FACT CHECK ENGINE","SHENANIGAN DETECTOR","ONLINE AUDIT UNIT","DECEPTION MONITOR","HONESTY ASSESSOR",
"LOGIC REVIEW PANEL","RISK EVALUATION SYSTEM","REALITY CHECK ENGINE","TRUTH VERIFICATION UNIT",
"VIBE ANALYSIS LAB","CURIOSITY INVESTIGATION TEAM","CASE FILE PROCESSOR","DECISION QUALITY MONITOR",
"INTEGRITY SCANNER","SKEPTICISM MODULE","PROBABILITY ASSESSOR","REPUTATION MONITOR",
"DIGITAL MAGNIFYING GLASS","ONLINE OBSERVATION SYSTEM","ANOMALY DETECTOR","TRUST EVALUATOR",
"LOGIC INSPECTION DEPARTMENT","INTERNET QUALITY CONTROL","BEHAVIOR ANALYSIS HUB","COMMON SENSE TASK FORCE",
"EVIDENCE COLLECTION UNIT","THE ALGORITHM","THE DETECTOR","THE AUDIT TEAM","THE INVESTIGATION BOARD",
"THE OBSERVATION NETWORK","THE REVIEW PANEL","THE CHECKPOINT SYSTEM","THE VERIFICATION UNIT"
];

const second = [
"DETECTED","IDENTIFIED","OBSERVED","FLAGGED","RECORDED","CONFIRMED","ANALYZED","DOCUMENTED",
"EXAMINED","LOGGED","MEASURED","CLASSIFIED","EVALUATED","MONITORED","TRACKED","QUESTIONED",
"INVESTIGATED","VERIFIED","AUDITED","INTERPRETED","PROCESSED","SCANNED","CALCULATED","REPORTED",
"ISOLATED","HIGHLIGHTED","PINPOINTED","UNCOVERED","DISCOVERED","RECOGNIZED","CORRELATED",
"RE-EVALUATED","DOUBLE-CHECKED","ESCALATED","FURTHER ANALYZED","PLACED UNDER REVIEW",
"SENT TO QUALITY CONTROL","MARKED FOR INSPECTION","TAGGED FOR REVIEW","REFERRED FOR ANALYSIS",
"REPORTED TO THE SYSTEM","ADDED TO CASE FILE","REOPENED FOR STUDY","RECONFIRMED","REVIEWED AGAIN",
"UPGRADED TO HIGH PRIORITY","FLAGGED AGAIN","VALIDATED","CROSSED-EXAMINED"
];

const third = [
"QUESTIONABLE ACTIVITY","EXCESSIVE CONFIDENCE","TOO MANY RED FLAGS","SUSPICIOUS ENERGY",
"UNUSUAL BEHAVIOR","CURIOUS DECISIONS","A HIGH SUS SCORE","UNEXPECTED SHENANIGANS",
"A TRUST DEFICIT","ODD CIRCUMSTANCES","A STRANGE PATTERN","UNCONVINCING EVIDENCE",
"A COMPLICATED EXPLANATION","A MYSTERIOUS DEVELOPMENT","QUESTIONABLE TIMING",
"EXCESSIVE OPTIMISM","A CONCERNING TREND","AN IMPROBABLE OUTCOME","TOO MANY COINCIDENCES",
"UNEXPECTED VARIABLES","A LOW CREDIBILITY SCORE","A RECORD NUMBER OF RED FLAGS",
"A STATISTICALLY INTERESTING RESULT","A RISKY CHOICE","A BOLD STRATEGY",
"AN UNSTABLE NARRATIVE","AN INCONSISTENT STORY","A WEAK EXPLANATION",
"AN OVERLY COMPLEX PLAN","A HIGHLY UNUSUAL SIGNATURE","A DIGITAL ANOMALY",
"UNEXPECTED PATTERNS DETECTED","A SIGNAL NOISE MIXTURE","A CONCERNING DATA SET",
"A QUESTIONABLE FOOTPRINT","AN UNUSUAL TRACE","A DISPUTED CLAIM",
"A VERY LOUD RED FLAG","A VERY QUIET WARNING","A FAST-CHANGING PROFILE",
"A HIGH-RISK BEHAVIOR SET","AN UNSTABLE PROFILE","A POSSIBLE MISDIRECTION"
];

const fourth = [
"THE INTERNET IS CONCERNED","THE QR CODE HAS QUESTIONS","THE DETECTOR NEVER SLEEPS",
"FURTHER REVIEW RECOMMENDED","COMMON SENSE HAS ENTERED THE CHAT","INVESTIGATION CONTINUES",
"THE CASE REMAINS OPEN","ADDITIONAL EVIDENCE REQUIRED","THE SYSTEM REMAINS SKEPTICAL",
"NO FINAL CONCLUSION","RECHECKING DATA","PLEASE STAND BY","ALGORITHM IS THINKING",
"THE AUDIT IS INCOMPLETE","RESULTS ARE UNSTABLE","MORE QUESTIONS THAN ANSWERS",
"FINAL VERDICT PENDING","REVIEW IN PROGRESS","UNCERTAIN OUTCOME","DATA STILL PROCESSING"
];

/* =========================
   HELPERS
========================= */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

const colors = ["#ff0000","#ffff00","#00ff00","#00ffff","#ff00ff","#ffffff","#ff8800","#88ff00","#00aaff"];

function generateMessage(){
    return `${pick(first)}
${pick(second)}
${pick(third)}

${pick(fourth)}

CASE #${Math.floor(Math.random()*999999)}`;
}

/* =========================
   LOOP
========================= */

function update(){
    document.body.style.backgroundColor = pick(colors);
    const msg = document.getElementById("message");
    msg.style.color = pick(colors);
    msg.innerText = generateMessage();
}

update();
setInterval(update, 1000);

</script>

</body>
</html>
